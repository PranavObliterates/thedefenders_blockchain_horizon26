<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SettleX - Trader Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0a1a; color: #e0e0e0; min-height: 100vh; }
    nav { background: #111128; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #00d4ff; }
    nav h1 { color: #00d4ff; font-size: 24px; letter-spacing: 2px; }
    .nav-links a { color: #888; text-decoration: none; margin-left: 24px; font-size: 16px; padding: 8px 16px; border-radius: 6px; transition: all 0.3s; }
    .nav-links a:hover, .nav-links a.active { color: #00d4ff; background: rgba(0,212,255,0.1); }
    .container { max-width: 1200px; margin: 24px auto; padding: 0 16px; }
    .trader-select { background: #111128; padding: 16px 24px; border-radius: 10px; margin-bottom: 24px; display: flex; align-items: center; gap: 16px; }
    .trader-select label { font-weight: bold; color: #00d4ff; }
    .trader-select select { padding: 8px 16px; border-radius: 6px; border: 1px solid #333; background: #1a1a2e; color: #fff; font-size: 14px; }
    .address { color: #888; font-size: 13px; font-family: monospace; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 24px; }
    .card { background: #111128; border-radius: 12px; padding: 24px; border: 1px solid #222; transition: border-color 0.3s; }
    .card:hover { border-color: #00d4ff; }
    .card h2 { color: #00d4ff; font-size: 18px; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid #222; }
    .full-width { margin-bottom: 24px; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 13px; color: #888; margin-bottom: 4px; }
    .form-group input, .form-group select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #333; background: #1a1a2e; color: #fff; font-size: 14px; }
    button { background: #00d4ff; color: #000; border: none; padding: 10px 24px; border-radius: 6px; font-weight: bold; font-size: 14px; cursor: pointer; transition: background 0.3s; margin-top: 8px; }
    button:hover { background: #00b8d4; }
    .result { margin-top: 12px; padding: 10px; border-radius: 6px; font-size: 13px; font-family: monospace; word-break: break-all; }
    .result.success { background: rgba(0,255,100,0.1); color: #00ff64; border: 1px solid #00ff64; }
    .result.error { background: rgba(255,0,0,0.1); color: #ff4444; border: 1px solid #ff4444; }
    .info { color: #888; font-size: 14px; font-style: italic; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead { background: #1a1a2e; }
    th { padding: 12px 10px; text-align: left; color: #00d4ff; font-weight: 600; border-bottom: 2px solid #333; }
    td { padding: 10px; border-bottom: 1px solid #1a1a2e; font-family: monospace; font-size: 12px; }
    tr:hover { background: rgba(0,212,255,0.05); }
    .status-active { color: #00ff64; }
    .loading { color: #666; font-style: italic; }
  </style>
</head>
<body>
  <nav>
    <h1>SettleX</h1>
    <div class="nav-links">
      <a href="index.html" class="active">Trader</a>
      <a href="regulator.html">Regulator</a>
    </div>
  </nav>

  <div class="container">
    <div class="trader-select">
      <label>Select Trader:</label>
      <select id="traderSelect">
        <option value="1">Trader 1</option>
        <option value="2">Trader 2</option>
        <option value="3">Trader 3</option>
      </select>
      <span id="traderAddress" class="address"></span>
    </div>

    <div class="grid">
      <div class="card">
        <h2>Portfolio</h2>
        <div id="portfolio">
          <p class="loading">Loading...</p>
        </div>
        <button onclick="loadPortfolio()">Refresh</button>
      </div>

      <div class="card">
        <h2>Deposit tINR</h2>
        <div class="form-group">
          <label>Amount (INR)</label>
          <input type="number" id="depositAmount" placeholder="e.g. 100000" />
        </div>
        <button onclick="deposit()">Deposit</button>
        <div id="depositResult" class="result"></div>
      </div>

      <div class="card">
        <h2>Place Order</h2>
        <div class="form-group">
          <label>Stock</label>
          <select id="orderStock">
            <option value="RELIANCE">RELIANCE</option>
            <option value="TCS">TCS</option>
            <option value="INFY">INFY</option>
            <option value="HDFCBANK">HDFCBANK</option>
          </select>
        </div>
        <div class="form-group">
          <label>Side</label>
          <select id="orderSide">
            <option value="buy">BUY</option>
            <option value="sell">SELL</option>
          </select>
        </div>
        <div class="form-group">
          <label>Quantity</label>
          <input type="number" id="orderQty" placeholder="e.g. 30" />
        </div>
        <div class="form-group">
          <label>Price per Share</label>
          <input type="number" id="orderPrice" placeholder="e.g. 2500" />
        </div>
        <button onclick="placeOrder()">Place Order</button>
        <div id="orderResult" class="result"></div>
      </div>

      <div class="card">
        <h2>Approve Tokens</h2>
        <p class="info">Tokens were pre-approved during deployment. No action needed for demo.</p>
      </div>
    </div>

    <div class="card full-width">
      <h2>Order Book</h2>
      <table id="orderBookTable">
        <thead>
          <tr><th>ID</th><th>Trader</th><th>Stock</th><th>Side</th><th>Qty</th><th>Price</th><th>Active</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="card full-width">
      <h2>Trade History</h2>
      <table id="tradeTable">
        <thead>
          <tr><th>ID</th><th>Buyer</th><th>Seller</th><th>Stock</th><th>Qty</th><th>Price</th><th>Total</th><th>Status</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script>
    const API = "http://localhost:3001";
    let traders = {};

    async function init() {
      try {
        const res = await fetch(API + "/api/traders");
        traders = await res.json();
        updateTraderAddress();
        loadPortfolio();
        loadOrders();
        loadTrades();
      } catch(e) {
        document.getElementById("portfolio").innerHTML = '<p style="color:#ff4444">Cannot connect to backend. Make sure node server.js is running.</p>';
      }
    }

    function updateTraderAddress() {
      const idx = document.getElementById("traderSelect").value;
      document.getElementById("traderAddress").textContent = traders["trader" + idx] || "";
    }

    document.getElementById("traderSelect").addEventListener("change", () => {
      updateTraderAddress();
      loadPortfolio();
    });

    async function loadPortfolio() {
      const idx = document.getElementById("traderSelect").value;
      const addr = traders["trader" + idx];
      const div = document.getElementById("portfolio");
      div.innerHTML = '<p class="loading">Loading...</p>';
      try {
        const res = await fetch(API + "/api/portfolio/" + addr);
        const data = await res.json();
        div.innerHTML = '<p><strong>tINR:</strong> ₹' + parseFloat(data.tINR).toLocaleString() + '</p>' +
          Object.entries(data.stocks).map(function(e) { return '<p><strong>' + e[0] + ':</strong> ' + parseFloat(e[1]).toLocaleString() + ' shares</p>'; }).join("");
      } catch(e) {
        div.innerHTML = '<p style="color:#ff4444">Error loading portfolio</p>';
      }
    }

    async function deposit() {
      const idx = document.getElementById("traderSelect").value;
      const addr = traders["trader" + idx];
      const amount = document.getElementById("depositAmount").value;
      const rd = document.getElementById("depositResult");
      if (!amount) { rd.className = "result error"; rd.textContent = "Enter an amount"; return; }
      try {
        const res = await fetch(API + "/api/deposit", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ traderAddress: addr, amount: parseInt(amount) }) });
        const data = await res.json();
        if (data.success) { rd.className = "result success"; rd.textContent = "Deposited INR " + amount + " | Tx: " + data.txHash.slice(0, 20) + "..."; loadPortfolio(); }
        else { rd.className = "result error"; rd.textContent = data.error; }
      } catch(e) { rd.className = "result error"; rd.textContent = e.message; }
    }

    async function placeOrder() {
      const traderIndex = parseInt(document.getElementById("traderSelect").value);
      const stockSymbol = document.getElementById("orderStock").value;
      const side = document.getElementById("orderSide").value;
      const quantity = parseInt(document.getElementById("orderQty").value);
      const price = parseInt(document.getElementById("orderPrice").value);
      const rd = document.getElementById("orderResult");
      if (!quantity || !price) { rd.className = "result error"; rd.textContent = "Enter quantity and price"; return; }
      try {
        const res = await fetch(API + "/api/order", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ traderIndex: traderIndex, stockSymbol: stockSymbol, side: side, quantity: quantity, price: price }) });
        const data = await res.json();
        if (data.success) { rd.className = "result success"; rd.textContent = side.toUpperCase() + " " + quantity + " " + stockSymbol + " @ INR " + price + " | Tx: " + data.txHash.slice(0, 20) + "..."; loadOrders(); loadTrades(); loadPortfolio(); }
        else { rd.className = "result error"; rd.textContent = data.error; }
      } catch(e) { rd.className = "result error"; rd.textContent = e.message; }
    }

    async function loadOrders() {
      try {
        const res = await fetch(API + "/api/orders");
        const orders = await res.json();
        var tbody = document.querySelector("#orderBookTable tbody");
        if (orders.length === 0) { tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#666">No orders yet</td></tr>'; return; }
        tbody.innerHTML = orders.map(function(o) { return '<tr><td>' + o.orderId + '</td><td>' + o.trader.slice(0,8) + '...' + o.trader.slice(-4) + '</td><td>' + o.stockSymbol + '</td><td style="color:' + (o.side==="buy"?"#00ff64":"#ff4444") + '">' + o.side.toUpperCase() + '</td><td>' + o.quantity + '</td><td>INR ' + o.pricePerShare.toLocaleString() + '</td><td class="' + (o.isActive?"status-active":"") + '">' + (o.isActive?"Active":"Filled") + '</td></tr>'; }).join("");
      } catch(e) { console.error(e); }
    }

    async function loadTrades() {
      try {
        const res = await fetch(API + "/api/trades");
        const trades = await res.json();
        var tbody = document.querySelector("#tradeTable tbody");
        if (trades.length === 0) { tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#666">No trades yet</td></tr>'; return; }
        tbody.innerHTML = trades.map(function(t) { return '<tr><td>' + t.tradeId + '</td><td>' + t.buyer.slice(0,8) + '...' + t.buyer.slice(-4) + '</td><td>' + t.seller.slice(0,8) + '...' + t.seller.slice(-4) + '</td><td>' + t.stockSymbol + '</td><td>' + t.quantity + '</td><td>INR ' + t.pricePerShare.toLocaleString() + '</td><td>INR ' + t.totalValue.toLocaleString() + '</td><td class="status-active">' + t.status + '</td></tr>'; }).join("");
      } catch(e) { console.error(e); }
    }

    init();
  </script>
</body>
</html>
